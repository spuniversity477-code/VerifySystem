<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>University Management System</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0a2c7d,#7b0c2f);
overflow:hidden;
}

.card{
width:90%;
max-width:900px;
padding:70px 40px;
text-align:center;
background:rgba(255,255,255,0.10);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,0.15);
border-radius:25px;
box-shadow:0 8px 32px rgba(0,0,0,0.25);
}

.icon{
font-size:120px;
margin-bottom:20px;
}

.welcome{
font-size:70px;
font-weight:700;
color:#ffd54f;
letter-spacing:3px;
margin-bottom:15px;
}

.title{
font-size:42px;
font-weight:600;
color:#ffffff;
margin-bottom:20px;
}

.line{
width:120px;
height:4px;
background:#ffd54f;
margin:25px auto 0;
border-radius:10px;
}

@media(max-width:768px){
.icon{font-size:90px;}
.welcome{font-size:45px;}
.title{font-size:28px;}
.card{padding:50px 20px;}
}

.action-btn {
  display: inline-block;
  margin-top: 40px;
  padding: 15px 40px;
  background: #ffd54f;
  color: #0a2c7d;
  text-decoration: none;
  font-size: 20px;
  font-weight: 700;
  border-radius: 30px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  transition: all 0.3s ease;
}

</style>
</head>

<body>

<div class="card">

<div class="icon">🏛️</div>

<h1 class="welcome">WELCOME</h1>

<h2 class="title">UNIVERSITY MANAGEMENT SYSTEM</h2>

<div class="line"></div>

</div>

</body>
</html>
