<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Verification Portal | Sardar Patel University, Balaghat M.P.</title>
<style>
  :root{
    --navy:#0a1172;
    --maroon:#5e0b22;
    --accent-green:#3fae4a;
    --purple:#5b2a86;
    --text-dark:#222;
    --bg:#f4f6fa;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
    background:var(--bg);
    color:var(--text-dark);
  }

  /* ===== HEADER ===== */
  header.topbar{
    position:relative;
    display:flex;
    align-items:center;
    height:64px;
    background:linear-gradient(90deg,#1b3fa0 0%,#16327f 38%,#3a0d1f 70%,#5e0b22 100%);
    overflow:hidden;
    padding:0 18px;
  }
  header.topbar::after{
    content:'';
    position:absolute;
    top:-20px;right:18%;
    width:260px;height:120px;
    background:linear-gradient(135deg,var(--accent-green) 0%,rgba(63,174,74,0) 70%);
    transform:rotate(20deg);
    opacity:.85;
    pointer-events:none;
  }
  .menu-icon{
    color:#fff;
    font-size:22px;
    margin-right:14px;
    cursor:pointer;
    z-index:2;
  }
  .logo-circle{
    width:42px;height:42px;
    border-radius:50%;
    background:#fff;
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;
    flex-shrink:0;
    margin-right:14px;
    z-index:2;
    box-shadow:0 0 0 2px rgba(255,255,255,.4);
  }
  .logo-circle img{
    width:100%;height:100%;
    object-fit:contain;
  }
  .logo-circle .placeholder{
    font-size:10px;
    color:#888;
    text-align:center;
    line-height:1.1;
  }
  .uni-name{
    color:#fff;
    font-size:1.35rem;
    font-weight:700;
    letter-spacing:.3px;
    z-index:2;
    white-space:nowrap;
  }
  .expand-icon{
    margin-left:auto;
    color:#fff;
    opacity:.85;
    font-size:18px;
    z-index:2;
  }

  /* ===== BREADCRUMB ===== */
  .crumb-bar{
    padding:22px 32px 14px;
  }
  .crumb-bar .student{
    font-size:1.5rem;
    font-weight:300;
    color:#1a1a1a;
  }
  .crumb-bar .profile{
    font-weight:700;
    margin-left:6px;
  }
  .crumb-bar .sep{
    color:#bbb;
    margin:0 10px;
    font-weight:300;
  }
  .crumb-bar .portal-link{
    color:#7a5fa3;
    font-weight:600;
    font-size:.95rem;
  }
  .crumb-line{
    border:none;
    border-top:1px solid #e3e3e3;
    margin-top:10px;
  }

  /* ===== MAIN PANEL ===== */
  .wrap{
    max-width:1450px;
    margin:0 auto;
    padding:0 32px 60px;
  }
  .panel{
    background:var(--navy);
    border-radius:10px;
    padding:0;
    min-height:230px;
    position:relative;
    box-shadow:0 8px 24px rgba(0,0,0,.12);
  }
  .panel-spacer{height:90px;}

  .card{
    background:#fff;
    border-radius:6px;
    box-shadow:0 10px 30px rgba(0,0,0,.18);
    margin:0 24px;
    position:relative;
    top:-50px;
    padding:28px 30px 26px;
    display:flex;
    flex-wrap:wrap;
    align-items:flex-end;
    gap:24px;
  }
  .field{
    flex:1 1 200px;
    min-width:180px;
  }
  .field label{
    display:block;
    font-size:.82rem;
    font-weight:700;
    color:#222;
    margin-bottom:8px;
  }
  .field select,
  .field input{
    width:100%;
    padding:11px 12px;
    border:1px solid #c9ccd3;
    border-radius:5px;
    font-size:.92rem;
    color:#333;
    background:#fff;
  }
  .field select:focus,
  .field input:focus{
    outline:2px solid var(--purple);
    outline-offset:1px;
  }
  .btn{
    flex:0 0 auto;
    background:var(--purple);
    color:#fff;
    border:none;
    padding:13px 30px;
    border-radius:5px;
    font-size:.95rem;
    font-weight:600;
    cursor:pointer;
    white-space:nowrap;
    transition:background .15s ease;
  }
  .btn:hover{
    background:#4a2270;
  }

  #nf{
    display:none;
    color:#c62828;
    font-weight:600;
    margin:14px 24px 0;
  }

  /* ===== RESULT CARD ===== */
  .result{
    display:none;
    background:#fff;
    border-radius:6px;
    box-shadow:0 10px 30px rgba(0,0,0,.12);
    margin:24px 24px 0;
    padding:26px 30px;
    border-top:5px solid var(--accent-green);
  }
  .result h2{
    margin:0 0 16px;
    font-size:1.3rem;
    display:flex;
    align-items:center;
    gap:14px;
  }
  .badge{
    background:var(--accent-green);
    color:#fff;
    padding:6px 14px;
    border-radius:20px;
    font-size:.75rem;
    font-weight:700;
    letter-spacing:.5px;
  }
  #details p{
    margin:6px 0;
    font-size:.95rem;
  }
  #details b{
    display:inline-block;
    min-width:160px;
    color:#444;
  }
  .qr-note{
    margin-top:14px;
    font-size:.85rem;
    color:#777;
  }

  @media (max-width:760px){
    .uni-name{font-size:1.05rem;}
    .crumb-bar{padding:18px 18px 12px;}
    .wrap{padding:0 14px 50px;}
    .card{margin:0 10px;top:-40px;flex-direction:column;align-items:stretch;}
    .btn{width:100%;}
    .result{margin:18px 10px 0;}
  }
</style>
</head>
<body>

<header class="topbar">
  <span class="menu-icon">&#9776;</span>
  
  <div style="width:58px;height:58px;display:flex;align-items:center;justify-content:center;margin-right:14px;z-index:2;">
    <img src="../assets/logo.png" alt="University Logo" style="height:58px;width:auto;object-fit:contain;">
  </div>

  <span class="uni-name">Sardar Patel University, Balaghat M.P.</span>
  <span class="expand-icon">&#10532;</span>
</header>

<div class="crumb-bar">
  <span class="student">Student <span class="profile">Profile</span></span>
  <span class="sep">|</span>
  <span class="portal-link">Certificate Verification Portal</span>
  <hr class="crumb-line">
</div>

<div class="wrap">
  <div class="panel">
    <div class="panel-spacer"></div>
    <div class="card">
      <div class="field">
        <label for="faculty">Faculty</label>
        <select id="faculty">
          <option>Faculty of Computer Science</option>
          <option>Faculty of Commerce</option>
          <option>Faculty of Engineering</option>
          <option>Faculty of Pharmacy</option>
          <option>Faculty of Agriculture</option>
          <option>Faculty of Law</option>
          <option>Faculty of Management</option>
          <option>Faculty of Ayurvedic Studies</option>
        </select>
      </div>
      <div class="field">
        <label for="enrollment">Please Enter Enrollment / Registration No.</label>
        <input id="enrollment" placeholder="Enrollment / Registration No">
      </div>
      <div class="field">
        <label for="dob">Date of Birth</label>
        <input id="dob" type="date">
      </div>
      <button class="btn" onclick="verifyCertificate()">Search Details</button>
    </div>
    <div id="nf">Record Not Found</div>
  </div>

  <div class="result" id="result">
    <h2>Certificate Verified <span class="badge">VERIFIED</span></h2>
    <div id="details"></div>
    
  </div>
</div>

<script>
async function verifyCertificate(){
  const db = await fetch('../data/students.json').then(r => r.json());
  const faculty = document.getElementById('faculty');
  const enrollment = document.getElementById('enrollment');
  const dob = document.getElementById('dob');
  const result = document.getElementById('result');
  const nf = document.getElementById('nf');
  const details = document.getElementById('details');

  const s = db.find(x =>
    x.faculty === faculty.value &&
    x.enrollment === enrollment.value.trim() &&
    x.dob === dob.value
  );

  result.style.display = 'none';
  nf.style.display = 'none';

  if(!s){
    nf.style.display = 'block';
    return;
  }

  details.innerHTML = `
    <p><b>Student Name:</b> ${s.studentName}</p>
    <p><b>Date of Birth:</b> ${s.dob}</p>
    <p><b>Father's Name:</b> ${s.fatherName}</p>
    <p><b>Mother's Name:</b> ${s.motherName}</p>
    <p><b>Course:</b> ${s.course}</p>
    <p><b>Faculty:</b> ${s.faculty}</p>
    <p><b>Enrollment No:</b> ${s.enrollment}</p>
    <p><b>Certificate No:</b> ${s.certificateNo}</p>
    <p><b>Issue Date:</b> ${s.issueDate}</p>
    <p><b>Grade / Division:</b> ${s.division}</p>
  `;
  result.style.display = 'block';
}
</script>
</body>
</html>
